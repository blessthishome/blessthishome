<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Password | Bless This Home</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <main class="shell" style="max-width:720px; padding-top:40px;">
    <section class="panel">
      <h1>Set Your Password</h1>
      <p class="hint">Finish setting up your account below.</p>

      <div class="formGrid">
        <input id="newPassword" type="password" placeholder="New password" />
        <input id="confirmPassword" type="password" placeholder="Confirm password" />
      </div>

      <div class="actions">
        <button class="btn btnPrimary" id="setPasswordBtn" type="button">Set Password</button>
      </div>

      <div class="hint" id="setPasswordStatus">Waiting.</div>
    </section>
  </main>

  <script type="module">
    import { supabase } from './supabase-config.js'

    const statusEl = document.getElementById('setPasswordStatus')
    const btn = document.getElementById('setPasswordBtn')

    function setStatus(msg){
      if (statusEl) statusEl.textContent = msg
    }

    btn.onclick = async () => {
      const password = document.getElementById('newPassword').value
      const confirm = document.getElementById('confirmPassword').value

      if (!password || !confirm) {
        setStatus('Enter both password fields.')
        return
      }

      if (password !== confirm) {
        setStatus('Passwords do not match.')
        return
      }

      const { error } = await supabase.auth.updateUser({
        password
      })

      if (error) {
        setStatus(error.message)
        return
      }

      setStatus('Password set successfully. You can now sign in.')
      window.location.href = './admin.html'
    }
  </script>
</body>
</html>
